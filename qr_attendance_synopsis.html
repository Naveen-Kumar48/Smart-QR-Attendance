<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance System - Functional Prototype</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- QR utilities -->
    <script src="https://unpkg.com/html5-qrcode@2.3.9/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Font Awesome (for some specific icons if needed, mostly Lucide used) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-surface: #f3f4f6;
            --card-surface: #ffffff;
            --text-primary: #111827;
            --text-muted: #6b7280;
            --accent: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-surface);
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.45;
            z-index: -1;
            animation: pulseGlow 18s linear infinite;
        }

        body::before {
            top: -120px;
            right: -120px;
            background: rgba(99, 102, 241, 0.55);
        }

        body::after {
            bottom: -160px;
            left: -160px;
            background: rgba(236, 72, 153, 0.45);
            animation-delay: 4s;
        }

        body[data-theme='dark'] {
            --bg-surface: #05080f;
            --card-surface: #131735;
            --text-primary: #f8fafc;
            --text-muted: #94a3b8;
            color: var(--text-primary);
        }

        body[data-theme='dark']::before {
            background: rgba(59, 130, 246, 0.35);
        }

        body[data-theme='dark']::after {
            background: rgba(14, 165, 233, 0.25);
        }

        body[data-theme='dark'] .bg-white,
        body[data-theme='dark'] .theme-surface {
            background-color: var(--card-surface) !important;
            color: var(--text-primary) !important;
        }

        body[data-theme='dark'] .bg-gray-50,
        body[data-theme='dark'] .bg-gray-100 {
            background-color: rgba(255,255,255,0.04) !important;
        }

        body[data-theme='dark'] .text-gray-800,
        body[data-theme='dark'] .text-gray-700 {
            color: var(--text-primary) !important;
        }

        body[data-theme='dark'] .text-gray-600,
        body[data-theme='dark'] .text-gray-500,
        body[data-theme='dark'] .text-gray-400 {
            color: var(--text-muted) !important;
        }

        body[data-theme='dark'] .bg-white\/20 {
            background-color: rgba(255,255,255,0.12);
        }

        .qr-container img { margin: 0 auto; }

        .theme-toggle-control {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .toggle {
            display: inline-block;
            position: relative;
            height: 64px;
            width: 64px;
        }

        .toggle::before {
            content: '';
            position: absolute;
            margin-left: -28px;
            margin-top: -28px;
            border-radius: 80px;
            background: rgba(255,255,255,0.8);
            opacity: 0.2;
            height: 56px;
            width: 56px;
            left: 50%;
            top: 50%;
            box-shadow: 0 0 35px rgba(0,0,0,0.15);
        }

        .toggle input {
            opacity: 0;
            position: absolute;
            cursor: pointer;
            z-index: 2;
            height: 100%;
            width: 100%;
            left: 0;
            top: 0;
            margin: 0;
        }

        .toggle .button {
            transition: all 300ms cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow:
                0 15px 25px -4px rgba(0, 0, 0, 0.5),
                inset 0 -3px 4px -1px rgba(0, 0, 0, 0.2),
                0 -10px 15px -1px rgba(255, 255, 255, 0.6),
                inset 0 3px 4px -1px rgba(255, 255, 255, 0.2),
                inset 0 0 5px 1px rgba(255, 255, 255, 0.8),
                inset 0 20px 30px 0 rgba(255, 255, 255, 0.2);
            border-radius: 70px;
            position: absolute;
            background: #eaeaea;
            margin-left: -30px;
            margin-top: -30px;
            display: block;
            height: 60px;
            width: 60px;
            left: 50%;
            top: 50%;
        }

        body[data-theme='dark'] .toggle .button {
            background: #111b2c;
            box-shadow:
                0 18px 35px -4px rgba(0, 0, 0, 0.65),
                inset 0 -3px 4px -1px rgba(0, 0, 0, 0.4),
                0 -12px 20px -1px rgba(15, 23, 42, 0.9),
                inset 0 3px 4px -1px rgba(255, 255, 255, 0.08),
                inset 0 0 6px 1px rgba(15, 23, 42, 0.8),
                inset 0 20px 30px 0 rgba(15, 23, 42, 0.35);
        }

        .toggle .label {
            transition: color 300ms ease-out, font-size 200ms ease;
            line-height: 64px;
            text-align: center;
            position: absolute;
            font-weight: 700;
            font-size: 26px;
            display: block;
            opacity: 0.9;
            height: 100%;
            width: 100%;
            color: rgba(0, 0, 0, 0.8);
        }

        body[data-theme='dark'] .toggle .label {
            color: rgba(255,255,255,0.8);
        }

        .toggle input:active ~ .button {
            filter: blur(0.4px);
            box-shadow:
                0 12px 22px -4px rgba(0, 0, 0, 0.4),
                inset 0 -8px 30px 1px rgba(255, 255, 255, 0.9),
                0 -10px 15px -1px rgba(255, 255, 255, 0.6),
                inset 0 8px 25px 0 rgba(0, 0, 0, 0.4),
                inset 0 0 10px 1px rgba(255, 255, 255, 0.6);
        }

        .toggle input:active ~ .label {
            font-size: 24px;
            color: rgba(0, 0, 0, 0.55);
        }

        .toggle input:checked ~ .button {
            filter: blur(0.2px);
            box-shadow:
                0 10px 20px -4px rgba(0, 0, 0, 0.45),
                inset 0 -8px 25px -1px rgba(255, 255, 255, 0.9),
                0 -10px 15px -1px rgba(255, 255, 255, 0.6),
                inset 0 8px 20px 0 rgba(0, 0, 0, 0.2),
                inset 0 0 5px 1px rgba(255, 255, 255, 0.6);
        }

        .toggle input:checked ~ .label {
            color: rgba(255, 149, 0, 0.9);
        }

        .theme-surface {
            background-color: var(--card-surface);
            color: var(--text-primary);
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        }

        .floating-card {
            position: relative;
            animation: float 9s ease-in-out infinite;
        }

        .floating-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(236,72,153,0.1));
            filter: blur(24px);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .floating-card:hover::before {
            opacity: 1;
        }

        .animated-gradient {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(99,102,241,0.3), transparent 45%),
                        radial-gradient(circle at bottom right, rgba(236,72,153,0.25), transparent 45%);
            opacity: 0.7;
            animation: aurora 12s ease-in-out infinite alternate;
        }

        .theme-toggle {
            border-radius: 999px;
            padding: 0.35rem 0.8rem;
            background: rgba(99,102,241,0.12);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.12);
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .theme-toggle:hover {
            transform: translateY(-1px);
            background: rgba(99,102,241,0.2);
        }

        .glow-pill {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        @keyframes aurora {
            0% { transform: translate3d(-5%, -5%, 0) scale(1); }
            50% { transform: translate3d(5%, 2%, 0) scale(1.05); }
            100% { transform: translate3d(-3%, 4%, 0) scale(1.02); }
        }

        @keyframes pulseGlow {
            0% { opacity: 0.35; transform: scale(0.95); }
            50% { opacity: 0.55; transform: scale(1.05); }
            100% { opacity: 0.35; transform: scale(0.95); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        const STORAGE_KEYS = {
            users: 'qr_users',
            students: 'qr_students',
            logs: 'qr_logs',
            session: 'qr_session'
        };

        const generateId = () => Math.random().toString(36).substr(2, 9).toUpperCase();
        const getCurrentTime = () => new Date().toLocaleString();

        const loadFromStorage = (key, fallback) => {
            try {
                const value = localStorage.getItem(key);
                return value ? JSON.parse(value) : fallback;
            } catch (error) {
                console.warn(`Unable to load ${key}`, error);
                return fallback;
            }
        };

        const persistState = (key, value) => {
            try {
                localStorage.setItem(key, JSON.stringify(value));
            } catch (error) {
                console.warn(`Unable to persist ${key}`, error);
            }
        };

        const getSavedTheme = () => {
            try {
                return localStorage.getItem('qr_theme') || 'light';
            } catch (err) {
                return 'light';
            }
        };

        document.body.dataset.theme = getSavedTheme();

        const copyPayload = (payload) => {
            if (navigator && navigator.clipboard) {
                navigator.clipboard.writeText(payload)
                    .then(() => alert(`QR payload copied: ${payload}`))
                    .catch(() => alert(`QR payload: ${payload}`));
            } else {
                alert(`QR payload: ${payload}`);
            }
        };

        const initialStudents = [
            { id: 'STU001', name: 'Rahul Sharma', course: 'Physics', batch: 'Batch A', attendance: 85, history: [] },
            { id: 'STU002', name: 'Priya Patel', course: 'Chemistry', batch: 'Batch B', attendance: 92, history: [] },
            { id: 'STU003', name: 'Amit Singh', course: 'Maths', batch: 'Batch A', attendance: 78, history: [] },
        ];

        const initialUsers = [
            { id: 'USR_ADMIN', role: 'admin', name: 'Admin User', email: 'admin@campus.com', password: 'admin123' },
            { id: 'USR_FAC', role: 'faculty', name: 'Faculty Member', email: 'faculty@campus.com', password: 'faculty123' },
            { id: 'USR_STU001', role: 'student', name: 'Rahul Sharma', email: 'rahul@student.com', password: 'student123', studentId: 'STU001' },
        ];

        const ThemeToggle = ({ theme, onToggle, label }) => (
            <div className="theme-toggle-control" title="Toggle light / dark mode">
                <div className="toggle">
                    <input
                        type="checkbox"
                        checked={theme === 'dark'}
                        onChange={onToggle}
                        aria-label={label || 'Toggle theme'}
                    />
                    <span className="button"></span>
                    <span className="label">{theme === 'dark' ? '☾' : '☼'}</span>
                </div>
            </div>
        );

        const AuthPage = ({ onLogin, onSignup, theme, toggleTheme }) => {
            const [mode, setMode] = useState('login');
            const [loginForm, setLoginForm] = useState({ email: '', password: '' });
            const [signupForm, setSignupForm] = useState({
                name: '',
                email: '',
                password: '',
                role: 'student',
                course: '',
                batch: ''
            });
            const [feedback, setFeedback] = useState({
                type: 'info',
                message: 'Use the demo credentials below or create a new account.'
            });

            const switchMode = (nextMode) => {
                setMode(nextMode);
                setFeedback({
                    type: 'info',
                    message: nextMode === 'login'
                        ? 'Enter your registered email and password.'
                        : 'Fill in the details to provision a new account.'
                });
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const result = onLogin(loginForm);
                if (!result.success) {
                    setFeedback({ type: 'error', message: result.message });
                }
            };

            const handleSignup = (e) => {
                e.preventDefault();
                const result = onSignup(signupForm);
                setFeedback({ type: result.success ? 'success' : 'error', message: result.message });
                if (result.success) {
                    setSignupForm({
                        name: '',
                        email: '',
                        password: '',
                        role: 'student',
                        course: '',
                        batch: ''
                    });
                    setMode('login');
                }
            };

            return (
                <div className="relative min-h-screen flex items-center justify-center overflow-hidden p-4">
                    <div className="animated-gradient"></div>
                    <div className="absolute top-6 right-6 z-20">
                        <ThemeToggle theme={theme} onToggle={toggleTheme} label="Switch theme" />
                    </div>
                    <div className="bg-white/20 rounded-3xl shadow-2xl w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 overflow-hidden backdrop-blur-xl theme-surface floating-card">
                        <div className="bg-gradient-to-br from-indigo-600/90 to-purple-600 text-white p-10 flex flex-col justify-between relative overflow-hidden">
                            <div className="absolute inset-0 opacity-30">
                                <div className="aurora-wave absolute inset-0 bg-[radial-gradient(circle_at_top,_rgba(255,255,255,0.8),_transparent_55%)] animate-pulse"></div>
                            </div>
                            <div className="relative z-10 space-y-6">
                                <div className="bg-white/20 w-20 h-20 rounded-2xl flex items-center justify-center text-3xl mb-6 shadow-lg shadow-indigo-900/40">
                                    <i className="fas fa-qrcode animate-pulse"></i>
                                </div>
                                <h1 className="text-4xl font-bold leading-tight">Smart QR Attendance</h1>
                                <p className="text-white/80 text-sm max-w-sm">Secure prototype with role-based dashboards, live QR generation, camera scanning, and persistent records.</p>
                            </div>
                            <div className="space-y-2 text-sm relative z-10">
                                <p className="opacity-80 font-semibold">Demo credentials:</p>
                                <div className="glow-pill px-4 py-2 rounded-2xl text-xs leading-relaxed">
                                    <p className="font-mono">admin@campus.com / admin123</p>
                                    <p className="font-mono">faculty@campus.com / faculty123</p>
                                    <p className="font-mono">rahul@student.com / student123</p>
                                </div>
                            </div>
                        </div>

                        <div className="p-10 relative z-10">
                            <div className="flex mb-8 bg-gray-100 rounded-full p-1 theme-surface">
                                <button
                                    className={`flex-1 py-2 rounded-full text-sm font-semibold transition ${mode === 'login' ? 'bg-white shadow-lg' : 'text-gray-500'}`}
                                    onClick={() => switchMode('login')}
                                >
                                    Login
                                </button>
                                <button
                                    className={`flex-1 py-2 rounded-full text-sm font-semibold transition ${mode === 'signup' ? 'bg-white shadow-lg' : 'text-gray-500'}`}
                                    onClick={() => switchMode('signup')}
                                >
                                    Sign Up
                                </button>
                            </div>

                            <div
                                className={`p-3 rounded-xl mb-6 text-sm transition theme-surface ${
                                    feedback.type === 'error'
                                        ? 'bg-red-50 text-red-600'
                                        : feedback.type === 'success'
                                        ? 'bg-green-50 text-green-700'
                                        : 'bg-indigo-50 text-indigo-600'
                                }`}
                            >
                                {feedback.message}
                            </div>

                            {mode === 'login' ? (
                                <form className="space-y-4" onSubmit={handleLogin}>
                                    <div className="theme-surface rounded-2xl p-4 border border-gray-100/60 shadow-sm">
                                        <label className="text-sm text-gray-600 block mb-1">Email Address</label>
                                        <input
                                            type="email"
                                            required
                                            className="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-transparent"
                                            value={loginForm.email}
                                            onChange={(e) => setLoginForm({ ...loginForm, email: e.target.value })}
                                        />
                                    </div>
                                    <div className="theme-surface rounded-2xl p-4 border border-gray-100/60 shadow-sm">
                                        <label className="text-sm text-gray-600 block mb-1">Password</label>
                                        <input
                                            type="password"
                                            required
                                            className="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-transparent"
                                            value={loginForm.password}
                                            onChange={(e) => setLoginForm({ ...loginForm, password: e.target.value })}
                                        />
                                    </div>
                                    <button
                                        type="submit"
                                        className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-xl font-semibold shadow-lg shadow-indigo-500/30 hover:opacity-95 transition"
                                    >
                                        Access Dashboard
                                    </button>
                                </form>
                            ) : (
                                <form className="space-y-4" onSubmit={handleSignup}>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="theme-surface rounded-2xl p-4 border border-gray-100/60 shadow-sm">
                                            <label className="text-sm text-gray-600 block mb-1">Full Name</label>
                                            <input
                                                type="text"
                                                required
                                                className="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-transparent"
                                                value={signupForm.name}
                                                onChange={(e) => setSignupForm({ ...signupForm, name: e.target.value })}
                                            />
                                        </div>
                                        <div className="theme-surface rounded-2xl p-4 border border-gray-100/60 shadow-sm">
                                            <label className="text-sm text-gray-600 block mb-1">Role</label>
                                            <select
                                                className="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-transparent"
                                                value={signupForm.role}
                                                onChange={(e) => setSignupForm({ ...signupForm, role: e.target.value })}
                                            >
                                                <option value="student">Student</option>
                                                <option value="faculty">Faculty</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="theme-surface rounded-2xl p-4 border border-gray-100/60 shadow-sm">
                                        <label className="text-sm text-gray-600 block mb-1">Email</label>
                                        <input
                                            type="email"
                                            required
                                            className="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-transparent"
                                            value={signupForm.email}
                                            onChange={(e) => setSignupForm({ ...signupForm, email: e.target.value })}
                                        />
                                    </div>
                                    <div className="theme-surface rounded-2xl p-4 border border-gray-100/60 shadow-sm">
                                        <label className="text-sm text-gray-600 block mb-1">Password</label>
                                        <input
                                            type="password"
                                            required
                                            className="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-transparent"
                                            value={signupForm.password}
                                            onChange={(e) => setSignupForm({ ...signupForm, password: e.target.value })}
                                        />
                                    </div>
                                    {signupForm.role === 'student' && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="theme-surface rounded-2xl p-4 border border-gray-100/60 shadow-sm">
                                                <label className="text-sm text-gray-600 block mb-1">Course</label>
                                                <select
                                                    required={signupForm.role === 'student'}
                                                    className="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-transparent"
                                                    value={signupForm.course}
                                                    onChange={(e) => setSignupForm({ ...signupForm, course: e.target.value })}
                                                >
                                                    <option value="">Select course</option>
                                                    <option value="Physics">Physics</option>
                                                    <option value="Chemistry">Chemistry</option>
                                                    <option value="Maths">Maths</option>
                                                </select>
                                            </div>
                                            <div className="theme-surface rounded-2xl p-4 border border-gray-100/60 shadow-sm">
                                                <label className="text-sm text-gray-600 block mb-1">Batch</label>
                                                <select
                                                    required={signupForm.role === 'student'}
                                                    className="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-transparent"
                                                    value={signupForm.batch}
                                                    onChange={(e) => setSignupForm({ ...signupForm, batch: e.target.value })}
                                                >
                                                    <option value="">Select batch</option>
                                                    <option value="Batch A">Batch A</option>
                                                    <option value="Batch B">Batch B</option>
                                                </select>
                                            </div>
                                        </div>
                                    )}
                                    <button
                                        type="submit"
                                        className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-xl font-semibold shadow-lg shadow-indigo-500/30 hover:opacity-95 transition"
                                    >
                                        Create Account
                                    </button>
                                </form>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const AdminDashboard = ({ students, setStudents, logs }) => {
            const [view, setView] = useState('stats');
            const [newStudent, setNewStudent] = useState({ name: '', course: '', batch: '' });

            const totalStudents = students.length;
            const totalPresentToday = useMemo(
                () => logs.filter((l) => new Date(l.timestamp).toDateString() === new Date().toDateString()).length,
                [logs]
            );
            const avgAttendance = useMemo(() => {
                if (!totalStudents) return 0;
                const total = students.reduce((acc, curr) => acc + curr.attendance, 0);
                return Math.round(total / totalStudents);
            }, [students, totalStudents]);

            const handleAddStudent = (e) => {
                e.preventDefault();
                const student = {
                    id: `STU${generateId()}`,
                    name: newStudent.name,
                    course: newStudent.course || 'General',
                    batch: newStudent.batch || 'Batch A',
                    attendance: 0,
                    history: []
                };
                setStudents((prev) => [...prev, student]);
                setNewStudent({ name: '', course: '', batch: '' });
                setView('students');
                alert(`Student Registered! Share QR payload ${student.id} with ${student.name}.`);
            };

            return (
                <div className="p-6 max-w-7xl mx-auto">
                    <header className="mb-8 flex flex-wrap gap-4 justify-between items-center">
                        <div>
                            <h2 className="text-2xl font-bold text-gray-800">Admin Dashboard</h2>
                            <p className="text-gray-500">Manage student records, QR codes, and live attendance logs.</p>
                        </div>
                        <div className="space-x-2">
                            <button
                                onClick={() => setView('stats')}
                                className={`px-4 py-2 rounded-lg ${view === 'stats' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-600'}`}
                            >
                                Overview
                            </button>
                            <button
                                onClick={() => setView('students')}
                                className={`px-4 py-2 rounded-lg ${view === 'students' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-600'}`}
                            >
                                Students
                            </button>
                            <button
                                onClick={() => setView('add')}
                                className={`px-4 py-2 rounded-lg ${view === 'add' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-600'}`}
                            >
                                Register New
                            </button>
                        </div>
                    </header>

                    {view === 'stats' && (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 theme-surface floating-card">
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="text-gray-500 text-sm font-medium">Total Students</h3>
                                    <span className="bg-blue-100 text-blue-600 p-2 rounded-lg"><i className="fas fa-users"></i></span>
                                </div>
                                <p className="text-3xl font-bold text-gray-800">{totalStudents}</p>
                            </div>
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 theme-surface floating-card">
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="text-gray-500 text-sm font-medium">Present Today</h3>
                                    <span className="bg-green-100 text-green-600 p-2 rounded-lg"><i className="fas fa-check-circle"></i></span>
                                </div>
                                <p className="text-3xl font-bold text-gray-800">{totalPresentToday}</p>
                            </div>
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 theme-surface floating-card">
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="text-gray-500 text-sm font-medium">Avg. Attendance</h3>
                                    <span className="bg-purple-100 text-purple-600 p-2 rounded-lg"><i className="fas fa-chart-line"></i></span>
                                </div>
                                <p className="text-3xl font-bold text-gray-800">{avgAttendance}%</p>
                            </div>

                            <div className="col-span-1 md:col-span-3 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden theme-surface floating-card">
                                <div className="p-6 border-b border-gray-100">
                                    <h3 className="font-bold text-gray-800">Recent Activity Log</h3>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-gray-50 text-gray-500">
                                            <tr>
                                                <th className="p-4">Time</th>
                                                <th className="p-4">Student Name</th>
                                                <th className="p-4">ID</th>
                                                <th className="p-4">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {logs.slice(0, 5).map((log) => (
                                                <tr key={log.id}>
                                                    <td className="p-4 text-gray-500">{log.timestamp}</td>
                                                    <td className="p-4 font-medium">{log.studentName}</td>
                                                    <td className="p-4 text-gray-500">{log.studentId}</td>
                                                    <td className="p-4">
                                                        <span className="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-semibold">
                                                            Present
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))}
                                            {logs.length === 0 && (
                                                <tr>
                                                    <td colSpan="4" className="p-4 text-center text-gray-400">No attendance marked yet today.</td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'students' && (
                        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden theme-surface floating-card">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-gray-50 text-gray-500">
                                    <tr>
                                        <th className="p-4">ID</th>
                                        <th className="p-4">Name</th>
                                        <th className="p-4">Course</th>
                                        <th className="p-4">Batch</th>
                                        <th className="p-4">QR Payload</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {students.map((s) => (
                                        <tr key={s.id} className="hover:bg-gray-50">
                                            <td className="p-4 font-mono text-xs text-gray-500">{s.id}</td>
                                            <td className="p-4 font-medium">{s.name}</td>
                                            <td className="p-4">{s.course}</td>
                                            <td className="p-4">{s.batch}</td>
                                            <td className="p-4">
                                                <button
                                                    onClick={() => copyPayload(s.id)}
                                                    className="text-indigo-600 hover:underline text-xs"
                                                >
                                                    Copy ID
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {view === 'add' && (
                        <div className="bg-white p-8 rounded-xl shadow-sm border border-gray-100 max-w-2xl mx-auto theme-surface floating-card">
                            <h3 className="text-xl font-bold mb-6">Register New Student</h3>
                            <form onSubmit={handleAddStudent} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                                    <input
                                        required
                                        type="text"
                                        className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                        value={newStudent.name}
                                        onChange={(e) => setNewStudent({ ...newStudent, name: e.target.value })}
                                    />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Course</label>
                                        <select
                                            required
                                            className="w-full p-3 border border-gray-300 rounded-lg"
                                            value={newStudent.course}
                                            onChange={(e) => setNewStudent({ ...newStudent, course: e.target.value })}
                                        >
                                            <option value="">Select Course</option>
                                            <option value="Physics">Physics</option>
                                            <option value="Chemistry">Chemistry</option>
                                            <option value="Maths">Maths</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Batch</label>
                                        <select
                                            required
                                            className="w-full p-3 border border-gray-300 rounded-lg"
                                            value={newStudent.batch}
                                            onChange={(e) => setNewStudent({ ...newStudent, batch: e.target.value })}
                                        >
                                            <option value="">Select Batch</option>
                                            <option value="Batch A">Batch A</option>
                                            <option value="Batch B">Batch B</option>
                                        </select>
                                    </div>
                                </div>
                                <button
                                    type="submit"
                                    className="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition-colors mt-4"
                                >
                                    Register & Generate QR
                                </button>
                            </form>
                        </div>
                    )}
                </div>
            );
        };

        const StudentPortal = ({ user, students }) => {
            const studentData = students.find((s) => s.id === user.id);
            const [qrPreview, setQrPreview] = useState('');

            useEffect(() => {
                if (!studentData) return;
                const payload = studentData.id;
                if (window.QRCode && window.QRCode.toDataURL) {
                    window.QRCode.toDataURL(payload, { width: 240, margin: 1 })
                        .then((url) => setQrPreview(url))
                        .catch(() =>
                            setQrPreview(`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${payload}`)
                        );
                } else {
                    setQrPreview(`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${payload}`);
                }
            }, [studentData ? studentData.id : null]);

            if (!studentData) {
                return (
                    <div className="p-6 text-center">
                        <p className="text-gray-500">No student record linked to this account.</p>
                    </div>
                );
            }

            return (
                <div className="p-6 max-w-lg mx-auto">
                    <div className="bg-white rounded-2xl shadow-xl overflow-hidden theme-surface floating-card">
                        <div className="bg-indigo-600 p-6 text-white text-center">
                            <div className="w-20 h-20 bg-white rounded-full mx-auto mb-3 flex items-center justify-center text-indigo-600 text-2xl font-bold">
                                {studentData.name.charAt(0)}
                            </div>
                            <h2 className="text-2xl font-bold">{studentData.name}</h2>
                            <p className="opacity-90">{studentData.course} • {studentData.batch}</p>
                        </div>

                        <div className="p-8 text-center">
                            <p className="text-gray-500 mb-4 text-sm">Show this QR code to the instructor to mark your attendance.</p>
                            <div className="border-2 border-dashed border-gray-300 rounded-xl p-4 inline-block mb-6 qr-container bg-white">
                                {qrPreview ? (
                                    <img src={qrPreview} alt="Student QR Code" className="w-48 h-48 object-contain mx-auto" />
                                ) : (
                                    <div className="text-gray-400 text-sm">Generating QR...</div>
                                )}
                            </div>
                            <p className="font-mono text-sm bg-gray-100 py-1 px-3 rounded-full inline-block text-gray-600">ID: {studentData.id}</p>
                            {qrPreview && (
                                <div className="mt-4">
                                    <a
                                        href={qrPreview}
                                        download={`${studentData.id}.png`}
                                        className="text-indigo-600 text-sm font-semibold hover:underline"
                                    >
                                        Download QR
                                    </a>
                                </div>
                            )}
                        </div>

                        <div className="bg-gray-50 p-6 border-t border-gray-100">
                            <h3 className="font-bold text-gray-800 mb-4">Attendance History</h3>
                            <div className="space-y-3">
                                {studentData.history.length > 0 ? (
                                    studentData.history.slice(0, 5).map((h, i) => (
                                        <div key={i} className="flex justify-between items-center bg-white p-3 rounded-lg shadow-sm">
                                            <span className="text-sm text-gray-600">{h.date}</span>
                                            <span className="bg-green-100 text-green-700 text-xs px-2 py-1 rounded font-semibold">
                                                {h.status}
                                            </span>
                                        </div>
                                    ))
                                ) : (
                                    <p className="text-center text-gray-400 text-sm italic">No recent history</p>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Scanner = ({ markAttendance }) => {
            const [scanMessage, setScanMessage] = useState('Camera ready');
            const [manualId, setManualId] = useState('');
            const scannerRef = useRef(null);
            const cooldownRef = useRef(false);

            useEffect(() => {
                if (!window.Html5QrcodeScanner) {
                    setScanMessage('Camera module failed to load. Use manual entry.');
                    return;
                }

                const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1 };
                scannerRef.current = new Html5QrcodeScanner('qr-reader', config, false);

                const onScanSuccess = (decodedText) => {
                    if (cooldownRef.current) return;
                    cooldownRef.current = true;
                    const cleanId = decodedText.trim().toUpperCase();
                    const success = markAttendance(cleanId);
                    setScanMessage(success ? `Attendance marked for ${cleanId}` : 'QR not recognized');
                    setTimeout(() => {
                        cooldownRef.current = false;
                        setScanMessage('Camera ready');
                    }, 2000);
                };

                const onScanError = () => {};

                scannerRef.current.render(onScanSuccess, onScanError);

                return () => {
                    if (scannerRef.current) {
                        scannerRef.current.clear().catch(() => {});
                        scannerRef.current = null;
                    }
                };
            }, [markAttendance]);

            const handleManualSubmit = (e) => {
                e.preventDefault();
                if (!manualId.trim()) return;
                const cleanId = manualId.trim().toUpperCase();
                const success = markAttendance(cleanId);
                setScanMessage(success ? `Attendance marked for ${cleanId}` : 'Student ID not found');
                setManualId('');
            };

            return (
                <div className="p-6 max-w-xl mx-auto">
                    <div className="bg-white rounded-2xl shadow-xl p-8 theme-surface floating-card">
                        <h2 className="text-2xl font-bold text-gray-800 mb-2 text-center">Attendance Scanner</h2>
                        <p className="text-gray-500 mb-6 text-center">Faculty Mode: Scan QR codes or enter IDs manually.</p>

                        <div className="rounded-2xl border border-dashed border-gray-200 p-4 mb-6">
                            <div id="qr-reader" className="w-full" />
                        </div>

                        <p className="text-sm text-center mb-4 text-indigo-600 font-medium">{scanMessage}</p>

                        <form onSubmit={handleManualSubmit} className="flex flex-col sm:flex-row gap-3">
                            <input
                                type="text"
                                placeholder="Enter Student ID"
                                className="flex-1 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 uppercase"
                                value={manualId}
                                onChange={(e) => setManualId(e.target.value)}
                            />
                            <button
                                type="submit"
                                className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition"
                            >
                                Mark
                            </button>
                        </form>

                        <div className="mt-6 text-left bg-blue-50 p-4 rounded-lg border border-blue-100 text-sm text-blue-700">
                            <p><strong>Tip:</strong> Point your camera at a student QR code. The embedded data is simply the student ID (e.g., STU001).</p>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [users, setUsers] = useState(() => loadFromStorage(STORAGE_KEYS.users, initialUsers));
            const [students, setStudents] = useState(() => loadFromStorage(STORAGE_KEYS.students, initialStudents));
            const [logs, setLogs] = useState(() => loadFromStorage(STORAGE_KEYS.logs, []));
            const [user, setUser] = useState(() => loadFromStorage(STORAGE_KEYS.session, null));
            const [theme, setTheme] = useState(() => getSavedTheme());

            useEffect(() => persistState(STORAGE_KEYS.users, users), [users]);
            useEffect(() => persistState(STORAGE_KEYS.students, students), [students]);
            useEffect(() => persistState(STORAGE_KEYS.logs, logs), [logs]);
            useEffect(() => {
                if (user) {
                    persistState(STORAGE_KEYS.session, user);
                } else {
                    localStorage.removeItem(STORAGE_KEYS.session);
                }
            }, [user]);

            useEffect(() => {
                document.body.dataset.theme = theme;
                localStorage.setItem('qr_theme', theme);
            }, [theme]);

            const toggleTheme = () => setTheme((prev) => (prev === 'light' ? 'dark' : 'light'));

            const handleLogin = ({ email, password }) => {
                const account = users.find(
                    (u) => u.email.toLowerCase() === email.toLowerCase() && u.password === password
                );
                if (!account) {
                    return { success: false, message: 'Invalid email or password.' };
                }

                const sessionUser = {
                    role: account.role,
                    name: account.name,
                    email: account.email
                };
                if (account.role === 'student') {
                    sessionUser.id = account.studentId;
                }

                setUser(sessionUser);
                return { success: true, message: 'Login successful' };
            };

            const handleSignup = (form) => {
                const { name, email, password, role, course, batch } = form;
                if (users.some((u) => u.email.toLowerCase() === email.toLowerCase())) {
                    return { success: false, message: 'Email already registered.' };
                }

                const newUser = {
                    id: `USR${generateId()}`,
                    name,
                    email,
                    password,
                    role
                };

                if (role === 'student') {
                    if (!course || !batch) {
                        return { success: false, message: 'Please select course and batch for student accounts.' };
                    }
                    const studentId = `STU${generateId()}`;
                    newUser.studentId = studentId;
                    const studentRecord = {
                        id: studentId,
                        name,
                        course,
                        batch,
                        attendance: 0,
                        history: []
                    };
                    setStudents((prev) => [...prev, studentRecord]);
                }

                setUsers((prev) => [...prev, newUser]);
                return { success: true, message: 'Account created! You can login now.' };
            };

            const handleLogout = () => setUser(null);

            const markAttendance = useCallback((studentId) => {
                if (!studentId) return false;
                const timestamp = getCurrentTime();
                let studentRecord = null;

                setStudents((prev) => {
                    const idx = prev.findIndex((s) => s.id.toUpperCase() === studentId.toUpperCase());
                    if (idx === -1) return prev;
                    studentRecord = prev[idx];
                    const updated = [...prev];
                    updated[idx] = {
                        ...studentRecord,
                        attendance: studentRecord.attendance + 1,
                        history: [{ date: timestamp, status: 'Present' }, ...studentRecord.history].slice(0, 20)
                    };
                    return updated;
                });

                if (!studentRecord) return false;

                setLogs((prev) => [
                    {
                        id: Date.now(),
                        studentId: studentRecord.id,
                        studentName: studentRecord.name,
                        timestamp,
                        status: 'Present'
                    },
                    ...prev
                ]);

                return true;
            }, []);

            return (
                <div className="min-h-screen bg-gray-50">
                    {user ? (
                        <>
                            <nav className="bg-white shadow-sm sticky top-0 z-50">
                                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                                    <div className="flex justify-between h-16">
                                        <div className="flex items-center">
                                            <i className="fas fa-qrcode text-indigo-600 text-xl mr-2"></i>
                                            <span className="font-bold text-gray-800">QR Attendance</span>
                                            <span className="ml-3 px-2 py-1 bg-gray-100 text-xs rounded-full text-gray-500 border border-gray-200">
                                                {user.role.toUpperCase()}
                                            </span>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <div className="hidden sm:flex">
                            <ThemeToggle theme={theme} onToggle={toggleTheme} label="Toggle color theme" />
                        </div>
                                            <span className="text-sm text-gray-600 mr-4 hidden md:block">Welcome, {user.name}</span>
                                            <button onClick={handleLogout} className="text-gray-500 hover:text-red-600 transition-colors">
                                                <i className="fas fa-sign-out-alt text-lg"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </nav>

                            {user.role === 'admin' && (
                                <AdminDashboard students={students} setStudents={setStudents} logs={logs} />
                            )}
                            {user.role === 'student' && <StudentPortal user={user} students={students} />}
                            {user.role === 'faculty' && <Scanner markAttendance={markAttendance} />}
                        </>
                    ) : (
                        <AuthPage onLogin={handleLogin} onSignup={handleSignup} theme={theme} toggleTheme={toggleTheme} />
                    )}
                </div>
            );
        };

        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes scan {
                0% { top: 0; }
                50% { top: 100%; }
                100% { top: 0; }
            }
        `;
        document.head.appendChild(styleSheet);

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
